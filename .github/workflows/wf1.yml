name: my first worflow concurrency
on: 
  schedule:
    - cron: "*/5 * * * *"
jobs:
  job1:
    name: job1
    runs-on: windows-latest
    steps:
      - name: step 1 - running single command in Job1 
        run : echo "Hi from job1 runner"
      - name : step 2 - check os 
        run : dir 
  job2:
    name : job2 
    runs-on: windows-latest
    steps:
      - name : step1:echo name
        run : echo "rachid"
      - name : step2:echo last name
        run : echo "errami"

  job3:
    name: job3
    needs: job1
    runs-on: windows-latest
    steps:
      - name: job3 step 1
        run : sleep 10 

  job4:
    name: job4
    needs: [job1,job2,job3]
    runs-on: windows-latest
    steps:
      - name: job4 step 1
        run : sleep 10 
    
    
  
  
